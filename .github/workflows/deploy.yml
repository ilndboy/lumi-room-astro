name: Deploy to Cloudflare Pages

on:
  # Disabled: Cloudflare Pages native Git integration handles deploys.
  # Re-enable this workflow once CLOUDFLARE_API_TOKEN is configured in GitHub secrets.
  # push:
  #   branches: [master]
  workflow_dispatch:  # Allow manual triggers for rebuilds

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=lumi-room-astro